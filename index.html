<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Space Explorer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div id="resultPopup" class="hidden">
    <div class="popup-box">
        <h2 id="resultText">BENAR</h2>
    </div>
</div>

<h1>🌌 Space Explorer</h1>
<p>⭐ Skor: <span id="score">0</span></p>

<!-- PERTANYAAN -->
<h2 id="question">Loading...</h2>

<div id="solar-system">

    <!-- ☀️ MATAHARI -->
    <div class="sun-wrapper">
        <div class="sun"></div>
    </div>

    <!-- 🪐 PLANET -->
    <div class="orbit mercury">
        <div class="planet" data-name="Merkurius">Merkurius</div>
    </div>

    <div class="orbit venus">
        <div class="planet" data-name="Venus">Venus</div>
    </div>

    <div class="orbit earth">
        <div class="planet" data-name="Bumi">Bumi</div>
    </div>

    <div class="orbit mars">
        <div class="planet" data-name="Mars">Mars</div>
    </div>

    <div class="orbit jupiter">
        <div class="planet" data-name="Jupiter">Jupiter</div>
    </div>

    <div class="orbit saturn">
        <div class="planet" data-name="Saturnus">Saturnus</div>
    </div>

    <div class="orbit uranus">
        <div class="planet" data-name="Uranus">Uranus</div>
    </div>

    <div class="orbit neptune">
        <div class="planet" data-name="Neptunus">Neptunus</div>
    </div>

</div>

<!-- POPUP -->
<div id="popup" class="hidden">
    <div class="box">
        <h2 id="planetName"></h2>
        <p id="planetInfo"></p>

        <div id="quiz" class="hidden">
            <p id="quizQuestion"></p>
            <button onclick="answer(true)">Benar</button>
            <button onclick="answer(false)">Salah</button>
        </div>

        <button onclick="closePopup()">Tutup</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
